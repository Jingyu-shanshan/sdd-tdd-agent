name: Toolchain fixtures

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  java-toolchains:
    name: ${{ matrix.build-tool }} fixture
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        build-tool: ["maven", "gradle"]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"
      - name: Install Gradle
        if: matrix.build-tool == 'gradle'
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          gradle-version: "9.6.1"
      - name: Run Maven fixture
        if: matrix.build-tool == 'maven'
        working-directory: tests/fixtures/toolchains/maven
        run: mvn test
      - name: Run Gradle fixture
        if: matrix.build-tool == 'gradle'
        working-directory: tests/fixtures/toolchains/gradle
        run: gradle test

  node-toolchains:
    name: ${{ matrix.package-manager }} fixture
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - package-manager: npm
            package-manager-version: 11.0.0
          - package-manager: pnpm
            package-manager-version: 10.2.0
          - package-manager: yarn
            package-manager-version: 4.6.0
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - name: Activate npm
        if: matrix.package-manager == 'npm'
        run: npm install --global npm@11.0.0
      - name: Activate pnpm
        if: matrix.package-manager == 'pnpm'
        run: |
          corepack enable
          corepack install --global pnpm@10.2.0
      - name: Activate Yarn
        if: matrix.package-manager == 'yarn'
        run: |
          corepack enable
          corepack install --global yarn@4.6.0
      - name: Install npm fixture
        if: matrix.package-manager == 'npm'
        working-directory: tests/fixtures/toolchains/npm
        run: npm ci
      - name: Run npm fixture
        if: matrix.package-manager == 'npm'
        working-directory: tests/fixtures/toolchains/npm
        run: npm test -- --run
      - name: Install pnpm fixture
        if: matrix.package-manager == 'pnpm'
        working-directory: tests/fixtures/toolchains/pnpm
        run: pnpm install --frozen-lockfile
      - name: Run pnpm fixture
        if: matrix.package-manager == 'pnpm'
        working-directory: tests/fixtures/toolchains/pnpm
        run: pnpm test -- --run
      - name: Install Yarn fixture
        if: matrix.package-manager == 'yarn'
        working-directory: tests/fixtures/toolchains/yarn
        run: yarn install --immutable
      - name: Run Yarn fixture
        if: matrix.package-manager == 'yarn'
        working-directory: tests/fixtures/toolchains/yarn
        run: yarn run test --run
