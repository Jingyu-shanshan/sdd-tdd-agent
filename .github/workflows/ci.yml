name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Python ${{ matrix.python-version }} quality
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.29"
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Synchronize locked dependencies
        run: uv sync --locked --dev
      - name: Check lint
        run: uv run ruff check .
      - name: Check formatting
        run: uv run ruff format --check .
      - name: Check types
        run: uv run pyright
      - name: Run tests
        run: uv run pytest
      - name: Build distribution
        if: matrix.python-version == '3.12'
        run: uv build

  shell-compatibility:
    name: ${{ matrix.shell }} compatibility
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shell: ["bash", "zsh"]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.29"
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install Zsh on disposable runner
        if: matrix.shell == 'zsh'
        run: |
          sudo apt-get update
          sudo apt-get install --yes zsh
      - name: Synchronize locked dependencies
        run: uv sync --locked --dev
      - name: Run tests through selected shell
        run: ${{ matrix.shell }} -lc 'uv run pytest'
